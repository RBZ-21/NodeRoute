[build]
buildCommand = "npm --prefix backend install && npm --prefix frontend-v2 install --include=dev && npm --prefix landing-v2 install --include=dev && npm --prefix driver-app install --include=dev && npm --prefix frontend-v2 exec -- tsc -p frontend-v2/tsconfig.json --noEmit && npm --prefix frontend-v2 run build && npm --prefix landing-v2 run build && npm --prefix driver-app run build"

[deploy]
startCommand = "node backend/server.js"
restartPolicyType = "on_failure"
