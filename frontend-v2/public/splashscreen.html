<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NodeRoute</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        background: #0f172a;
        height: 100vh;
        margin: 0;
        overflow: hidden;
        width: 100vw;
      }

      .splash {
        height: 100vh;
        width: 100vw;
      }

      video {
        display: block;
        height: 100%;
        object-fit: contain;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <main class="splash" aria-label="NodeRoute is starting">
      <video autoplay muted playsinline>
        <source src="/Animated_Logo.mp4" type="video/mp4" />
      </video>
    </main>
  </body>
</html>
