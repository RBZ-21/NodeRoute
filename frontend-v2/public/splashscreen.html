<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NodeRoute</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        background: #0f172a;
        height: 100vh;
        margin: 0;
        overflow: hidden;
        width: 100vw;
      }

      .splash {
        align-items: center;
        background: #0f172a;
        display: flex;
        height: 100vh;
        justify-content: center;
        position: relative;
        width: 100vw;
      }

      video {
        display: block;
        height: 100%;
        object-fit: contain;
        width: 100%;
      }

      .fallback {
        color: #f8fafc;
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 0.04em;
        position: absolute;
        text-transform: uppercase;
      }

      .video-ready .fallback {
        display: none;
      }
    </style>
  </head>
  <body>
    <main class="splash" id="splash" aria-label="NodeRoute is starting">
      <div class="fallback">NodeRoute</div>
      <video id="splash-video" autoplay muted loop playsinline preload="auto" aria-hidden="true">
        <source src="NodeRoute_Video_No_Logo.mp4" type="video/mp4" />
      </video>
    </main>
    <script>
      const splash = document.getElementById('splash');
      const video = document.getElementById('splash-video');

      function markReady() {
        splash.classList.add('video-ready');
      }

      if (video) {
        video.addEventListener('loadeddata', markReady, { once: true });
        video.addEventListener('canplay', markReady, { once: true });
        video.play().catch(() => {
          splash.classList.remove('video-ready');
        });
      }
    </script>
  </body>
</html>
