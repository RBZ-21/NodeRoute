name: NodeRouteDriver
options:
  bundleIdPrefix: com.noderoute
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  NodeRouteDriver:
    type: application
    platform: iOS
    sources:
      - NodeRouteDriver
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.noderoute.driver
        INFOPLIST_KEY_CFBundleDisplayName: NodeRoute Driver
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.business
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: Select a proof-of-delivery photo to attach to the stop.
        INFOPLIST_KEY_NSCameraUsageDescription: Capture proof-of-delivery photos for completed stops.
        INFOPLIST_KEY_API_BASE_URL: "$(API_BASE_URL)"
        API_BASE_URL: "https://your-backend.example.com"
